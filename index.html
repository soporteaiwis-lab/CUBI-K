<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBI-K | Portal IA Educativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #0a0e1a; --bg1: #111827; --bg2: #1a2236; --bg2h: #1f2a42; --bg3: #0f1629;
            --bd: #2a3550; --bdl: #3a4a6b;
            --ac: #00d4aa; --acg: rgba(0,212,170,.15); --acd: #00a888;
            --ac2: #6366f1; --ac2g: rgba(99,102,241,.15);
            --err: #ef4444; --errg: rgba(239,68,68,.12);
            --t1: #e8ecf4; --t2: #94a3b8; --t3: #64748b;
            --f1: 'Outfit', sans-serif; --f2: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--f1); background-color: var(--bg0); color: var(--t1); overflow-x: hidden; }

        /* UTILIDADES */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .grid { display: grid; }
        .btn { padding: 10px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--f1); font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: var(--ac); color: var(--bg0); }
        .btn-primary:hover { background: var(--acd); }
        .btn-danger { background: var(--err); color: white; }

        /* LOGIN */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg0); }
        .login-box { background: var(--bg1); padding: 40px; border-radius: 12px; border: 1px solid var(--bd); width: 100%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid var(--bd); background: var(--bg2); color: var(--t1); font-family: var(--f1); }

        /* APP LAYOUT */
        #app-screen { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--bg1); border-right: 1px solid var(--bd); padding: 20px; display: flex; flex-direction: column; }
        .menu-item { padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; color: var(--t2); font-weight: 500; transition: all 0.2s; }
        .menu-item:hover, .menu-item.active { background: var(--bg2); color: var(--ac); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg0); }

        /* TARJETAS CLASES */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--bg1); border: 1px solid var(--bd); border-radius: 10px; padding: 20px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--ac); }
        .card h3 { color: var(--ac); margin-bottom: 10px; }
        .card p { color: var(--t2); font-size: 14px; margin-bottom: 15px; }
        
        /* BOTÓN VISTO BUENO */
        .btn-visto { padding: 8px 16px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; font-family: var(--f1); font-weight: 600; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; width: 100%; justify-content: center; margin-top: 10px;}
        .visto-off { background: var(--bg2); color: var(--t2); border-color: var(--bd); }
        .visto-off:hover { background: var(--bg2h); }
        .visto-on { background: var(--acd); color: #fff; box-shadow: 0 0 10px var(--acg); }

        /* TABLAS BASE DE DATOS */
        .db-table-container { width: 100%; overflow-x: auto; margin-top: 15px; background: var(--bg1); border-radius: 8px; border: 1px solid var(--bd); padding: 10px;}
        .db-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--f2); white-space: nowrap; color: var(--t1); }
        .db-table th, .db-table td { border: 1px solid var(--bd); padding: 10px 12px; text-align: left; }
        .db-table th { background: var(--bg2); color: var(--ac); font-weight: 600; }
        .db-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        .db-table tr:hover { background: var(--bg2h); }

        /* FORMULARIOS Y MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg1); padding: 30px; border-radius: 12px; border: 1px solid var(--bd); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--t2); margin-bottom: 5px; font-size: 14px;}
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--bd); background: var(--bg2); color: var(--t1); font-family: var(--f1); }
        
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--bd); padding-bottom: 15px;}
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color: var(--ac); margin-bottom: 10px;">CUBI-K IA</h1>
            <p style="color: var(--t2); margin-bottom: 20px;">Portal Educativo</p>
            <input type="email" id="login-email" placeholder="Correo Corporativo o Personal">
            <button class="btn btn-primary" style="width: 100%;" onclick="iniciarSesion()">Ingresar</button>
            <p id="login-error" style="color: var(--err); margin-top: 15px; font-size: 14px;" class="hidden"></p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <h2 style="color: var(--ac); margin-bottom: 30px; text-align: center;">CUBI-K</h2>
            <div class="menu-item active" onclick="cambiarVista('vista-clases')">📚 Clases</div>
            <div class="menu-item" onclick="cambiarVista('vista-proyectos')">🚀 Proyectos</div>
            <div class="menu-item admin-only hidden" onclick="abrirConfiguracion()">⚙️ Configuración (DB)</div>
            
            <div style="margin-top: auto; border-top: 1px solid var(--bd); padding-top: 15px;">
                <p id="user-name" style="color: var(--t1); font-weight: 600; font-size: 14px;"></p>
                <p id="user-role" style="color: var(--t3); font-size: 12px; margin-bottom: 15px;"></p>
                <button class="btn" style="background: var(--bg2); color: var(--t2); width: 100%;" onclick="cerrarSesion()">Salir</button>
            </div>
        </div>

        <div class="main-content">
            
            <div id="vista-clases" class="vista">
                <div class="header-actions">
                    <h2>📚 Módulos y Clases</h2>
                    <button class="btn btn-primary admin-only hidden" onclick="abrirModalClase()">+ Nueva Clase</button>
                </div>
                <div id="contenedor-clases" class="card-grid">
                    </div>
            </div>

            <div id="vista-proyectos" class="vista hidden">
                <div class="header-actions">
                    <h2>🚀 Entregas de Proyectos</h2>
                </div>
                <p style="color: var(--t2);">Aquí podrás ver y subir tus entregas de proyectos.</p>
                </div>

            <div id="vista-config" class="vista hidden">
                <div class="header-actions">
                    <h2>⚙️ Panel de Control y Base de Datos</h2>
                    <p style="color: var(--ac);">Acceso Nivel: Administrador / Master Root</p>
                </div>
                <div id="db-container">
                    </div>
            </div>

        </div>
    </div>

    <div id="modal-clase" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-clase-titulo" style="color: var(--ac); margin-bottom: 20px;">Crear/Editar Clase</h3>
            <form id="form-clase" onsubmit="guardarClase(event)">
                <input type="hidden" id="form-id-clase">
                <div class="form-group">
                    <label>Título de la Clase</label>
                    <input type="text" id="form-titulo" required>
                </div>
                <div class="form-group">
                    <label>Fase ID</label>
                    <input type="text" id="form-fase" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="form-desc">
                </div>
                <div class="form-group">
                    <label>URL Video Meet</label>
                    <input type="url" id="form-video">
                </div>
                <div class="form-group">
                    <label>Material Drive (URL)</label>
                    <input type="url" id="form-drive">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn" style="background: var(--bg2); color: var(--t1); flex: 1;" onclick="cerrarModal('modal-clase')">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN GLOBAL
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwJA-B3Hw3pdhVGKC8Q2TA0cSrF26806Do_g1uh3EaqH8cJDAOnM8kiP6zj7i1MCWTBEg/exec';
        const ADMIN_PASSWORD = 'admincubik2026';
        
        let D = { usuarios: [], clases: [], proyectos: [], config: [] };
        let usuarioActual = null;
        let progresoLocal = {};

        // ==========================================
        // FUNCIONES DE RED (FETCH API)
        // ==========================================
        async function aPost(payload) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Evitar bloqueos CORS (Apps script devuelve opaco en POST)
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return { success: true }; // En no-cors asumimos éxito si no hay catch
            } catch (err) {
                console.error("Error POST:", err);
                return { success: false, message: err.message };
            }
        }

        async function cargarDatosGlobales() {
            try {
                const res = await fetch(API_URL + '?action=getTodo');
                const json = await res.json();
                if(json.success) {
                    D.usuarios = json.data.usuarios || [];
                    D.clases = json.data.clases || [];
                    D.proyectos = json.data.proyectos || [];
                    D.config = json.data.configuracion || [];
                }
            } catch (err) {
                console.error("Error obteniendo datos:", err);
                alert("Error de conexión con la base de datos.");
            }
        }

        // ==========================================
        // SISTEMA DE SESIÓN Y ROLES
        // ==========================================
        async function iniciarSesion() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const errorMsg = document.getElementById('login-error');
            
            if(!email) return;
            errorMsg.textContent = "Conectando con la base de datos...";
            errorMsg.style.color = "var(--ac)";
            errorMsg.classList.remove('hidden');

            await cargarDatosGlobales();

            const user = D.usuarios.find(u => 
                (u.Email_Corporativo && u.Email_Corporativo.toLowerCase() === email) || 
                (u.Email_Personal && u.Email_Personal.toLowerCase() === email)
            );

            if (user) {
                usuarioActual = user;
                try { progresoLocal = JSON.parse(user.Progreso_JSON || '{}'); } catch(e) { progresoLocal = {}; }
                
                document.getElementById('user-name').textContent = user.Nombre;
                document.getElementById('user-role').textContent = user.Rol + (user.Nombre.includes("Armin") ? " (Master Root)" : "");
                
                // Mostrar botones de admin si corresponde
                const esAdmin = user.Rol === 'Admin' || user.Nombre.includes('Armin Salazar');
                document.querySelectorAll('.admin-only').forEach(el => {
                    if(esAdmin) el.classList.remove('hidden');
                });

                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                renderizarClases();
            } else {
                errorMsg.textContent = "Usuario no encontrado. Verifique su correo.";
                errorMsg.style.color = "var(--err)";
            }
        }

        function cerrarSesion() {
            usuarioActual = null;
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-email').value = '';
        }

        // ==========================================
        // INTERFAZ: CLASES Y VISTO BUENO
        // ==========================================
        function cambiarVista(idVista) {
            document.querySelectorAll('.vista').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(idVista).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function renderizarClases() {
            const contenedor = document.getElementById('contenedor-clases');
            contenedor.innerHTML = '';

            D.clases.forEach(clase => {
                const isVisto = progresoLocal[clase.ID_Clase] === true;
                const claseHTML = `
                    <div class="card">
                        <span style="font-size:10px; background:var(--bd); padding:3px 6px; border-radius:4px;">Fase ${clase.Fase_ID || '-'}</span>
                        <h3 style="margin-top:10px;">${clase.Titulo_Clase || 'Sin Título'}</h3>
                        <p>${clase.Descripcion_Clase || 'Sin descripción disponible.'}</p>
                        
                        ${clase.Video_Meet_URL ? `<a href="${clase.Video_Meet_URL}" target="_blank" class="btn" style="background:var(--ac2g); color:var(--ac2); font-size:12px; display:inline-block; margin-bottom:10px;">🎥 Ver Grabación</a>` : ''}
                        
                        <button class="btn-visto ${isVisto ? 'visto-on' : 'visto-off'}" onclick="toggleVisto('${clase.ID_Clase}', this)">
                            ${isVisto ? '✅ Clase Completada' : '⬜ Marcar como Visto'}
                        </button>
                        
                        ${(usuarioActual.Rol === 'Admin' || usuarioActual.Nombre.includes('Armin')) ? 
                            `<button class="btn btn-danger" style="font-size:11px; margin-top:10px; width:100%;" onclick="eliminarClase('${clase.ID_Clase}')">🗑️ Eliminar Clase</button>` 
                        : ''}
                    </div>
                `;
                contenedor.innerHTML += claseHTML;
            });
        }

        async function toggleVisto(idClase, btnElement) {
            const estadoActual = progresoLocal[idClase] || false;
            progresoLocal[idClase] = !estadoActual; 

            // Actualizar UI INMEDIATAMENTE para que sea fluido
            if (progresoLocal[idClase]) {
                btnElement.className = 'btn-visto visto-on';
                btnElement.innerHTML = '✅ Clase Completada';
            } else {
                btnElement.className = 'btn-visto visto-off';
                btnElement.innerHTML = '⬜ Marcar como Visto';
            }

            // Enviar en segundo plano al backend
            const strProgreso = JSON.stringify(progresoLocal);
            // Actualizar el array local
            const userIndex = D.usuarios.findIndex(u => u.ID_Usuario === usuarioActual.ID_Usuario);
            if(userIndex > -1) D.usuarios[userIndex].Progreso_JSON = strProgreso;

            await aPost({ action: 'updateProgreso', idUsuario: usuarioActual.ID_Usuario, progreso: strProgreso });
        }

        // ==========================================
        // FUNCIONES ADMIN: CRUD Y BASE DE DATOS
        // ==========================================
        function abrirConfiguracion() {
            // Validar si ya puso la clave en esta sesión
            if (!sessionStorage.getItem('adminAutenticado')) {
                const pass = prompt("Acceso Restringido.\nIngrese la clave de administrador para ver la Base de Datos:");
                if (pass !== ADMIN_PASSWORD) {
                    alert("Clave incorrecta. Acceso denegado.");
                    return;
                }
                sessionStorage.setItem('adminAutenticado', 'true');
            }
            
            cambiarVista('vista-config');
            renderizarTablasDB();
        }

        function renderizarTablasDB() {
            const contenedor = document.getElementById('db-container');
            contenedor.innerHTML = `
                <h3 style="color:var(--t1); margin: 20px 0 10px 0;">👥 Tabla: Usuarios</h3>
                <div class="db-table-container">${generarHTMLTabla(D.usuarios)}</div>
                
                <h3 style="color:var(--t1); margin: 30px 0 10px 0;">📚 Tabla: Clases</h3>
                <div class="db-table-container">${generarHTMLTabla(D.clases)}</div>
                
                <h3 style="color:var(--t1); margin: 30px 0 10px 0;">⚙️ Tabla: Configuración</h3>
                <div class="db-table-container">${generarHTMLTabla(D.config)}</div>
            `;
        }

        function generarHTMLTabla(arrayDatos) {
            if (!arrayDatos || arrayDatos.length === 0) return '<p>No hay datos.</p>';
            const headers = Object.keys(arrayDatos[0]);
            let html = '<table class="db-table"><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            
            arrayDatos.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h] || '';
                    // Acortar strings muy largos (como JSON o URLs) para la vista DB
                    if(val.length > 40) val = val.substring(0,40) + '...'; 
                    html += `<td>${val}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        // ==========================================
        // MODALES Y ACCIONES POST SIN ERRORES
        // ==========================================
        function abrirModalClase(idClase = null) {
            document.getElementById('modal-clase').classList.remove('hidden');
            if (idClase) {
                // Modo Edición (puedes implementarlo buscando la clase)
            } else {
                // Modo Creación
                document.getElementById('form-clase').reset();
                document.getElementById('form-id-clase').value = 'CLS-' + Math.floor(Math.random() * 10000);
            }
        }

        function cerrarModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        async function guardarClase(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = "Guardando..."; btn.disabled = true;

            const nuevaClase = {
                ID_Clase: document.getElementById('form-id-clase').value,
                Fase_ID: document.getElementById('form-fase').value,
                Titulo_Clase: document.getElementById('form-titulo').value,
                Descripcion_Clase: document.getElementById('form-desc').value,
                Video_Meet_URL: document.getElementById('form-video').value,
                Material_Drive_URL: document.getElementById('form-drive').value,
                // Puedes agregar el resto de campos vacíos para mantener la estructura de la DB
                Tipo_Modulo: "Normal", Fecha_Clase: new Date().toISOString().split('T')[0]
            };

            // Estructura exacta que requiere el nuevo backend (v3.gs)
            const payload = {
                action: 'createClase',
                claseData: nuevaClase
            };

            await aPost(payload);
            
            // Actualizar UI Locamente sin recargar
            D.clases.push(nuevaClase);
            renderizarClases();
            
            cerrarModal('modal-clase');
            btn.textContent = "Guardar Cambios"; btn.disabled = false;
            alert("Clase agregada exitosamente a la base de datos.");
            if(document.getElementById('vista-config').classList.contains('hidden') === false) renderizarTablasDB();
        }

        async function eliminarClase(idClase) {
            if(!confirm(`¿Estás seguro de eliminar la clase ${idClase}?`)) return;
            
            await aPost({ action: 'deleteClase', idClase: idClase });
            
            // Quitar localmente
            D.clases = D.clases.filter(c => c.ID_Clase !== idClase);
            renderizarClases();
            if(document.getElementById('vista-config').classList.contains('hidden') === false) renderizarTablasDB();
            alert("Clase eliminada.");
        }

    </script>
</body>
</html>
